name: Initialize Hive Project
on: push

jobs:
  init:
    # Only run on the very first push (repo creation from template)
    if: github.run_number == 1
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Remove default labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for label in "bug" "documentation" "duplicate" "enhancement" \
            "good first issue" "help wanted" "invalid" "question" "wontfix"; do
            gh label delete "$label" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          done
          echo "Labels cleaned."

      - name: Self-destruct this workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git rm .github/workflows/init.yml
          git commit -m "chore: remove init workflow (setup complete)"
          git push
